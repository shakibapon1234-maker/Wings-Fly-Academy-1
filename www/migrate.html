<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WingsFly Migration Tool v2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', monospace; background: #0d1117; color: #c9d1d9; padding: 24px; min-height: 100vh; }
  h2 { color: #58a6ff; font-size: 22px; margin-bottom: 6px; }
  .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 20px; }
  
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  
  .file-drop { border: 2px dashed #30363d; border-radius: 8px; padding: 28px; text-align: center; cursor: pointer; transition: all .2s; }
  .file-drop:hover, .file-drop.active { border-color: #58a6ff; background: #1c2333; }
  .file-drop input { display: none; }
  .file-drop .icon { font-size: 36px; margin-bottom: 8px; }
  .file-drop .label { color: #58a6ff; font-size: 15px; }
  .file-drop .hint { color: #8b949e; font-size: 13px; margin-top: 4px; }
  
  #fileInfo { display: none; background: #1c2333; border: 1px solid #388bfd; border-radius: 8px; padding: 12px 16px; margin-top: 12px; font-size: 14px; }
  #fileInfo .name { color: #58a6ff; font-weight: bold; }
  
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 14px; }
  .stat-box { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px; text-align: center; }
  .stat-box .num { font-size: 22px; font-weight: bold; color: #58a6ff; }
  .stat-box .lbl { font-size: 12px; color: #8b949e; margin-top: 2px; }
  
  .table-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  .table-row { display: flex; align-items: center; gap: 10px; background: #0d1117; border-radius: 6px; padding: 8px 12px; font-size: 13px; }
  .table-row .tname { color: #e6edf3; flex: 1; font-weight: 600; }
  .table-row .tcount { color: #8b949e; }
  .table-row .tstatus { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: bold; }
  .status-pending { background: #2d2000; color: #d29922; }
  .status-ok { background: #0e2c0e; color: #3fb950; }
  .status-skip { background: #1c1c1c; color: #8b949e; }
  .status-err { background: #2d0000; color: #f85149; }
  .status-running { background: #0d1a33; color: #58a6ff; }
  
  .progress-bar-wrap { background: #21262d; border-radius: 99px; height: 8px; margin: 6px 0; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #388bfd, #58a6ff); transition: width .3s; }
  
  .btns { display: flex; gap: 10px; flex-wrap: wrap; }
  button { border: none; padding: 10px 22px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity .2s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #btnStart { background: #238636; color: #fff; }
  #btnClear { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
  
  #log { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; height: 260px; overflow-y: auto; padding: 12px; font-size: 12px; font-family: monospace; margin-top: 4px; }
  .log-ok  { color: #3fb950; }
  .log-err { color: #f85149; }
  .log-info { color: #58a6ff; }
  .log-warn { color: #d29922; }
  
  #summary { display: none; background: #0e2c0e; border: 1px solid #3fb950; border-radius: 8px; padding: 16px; font-size: 14px; margin-top: 4px; }
  #summary h3 { color: #3fb950; margin-bottom: 8px; }
  .sum-line { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #1a3a1a; }
  .sum-ok { color: #3fb950; }
  .sum-err { color: #f85149; }
</style>
</head>
<body>

<h2>🚀 WingsFly Migration Tool v2</h2>
<p class="subtitle">Backup JSON থেকে Supabase-এ সরাসরি migrate করুন — সব table একসাথে</p>

<!-- File Upload -->
<div class="card">
  <b style="color:#e6edf3">📂 Backup File নির্বাচন করুন</b>
  <div style="margin-top:12px">
    <div class="file-drop" id="dropZone" onclick="document.getElementById('backupFile').click()">
      <div class="icon">📄</div>
      <div class="label">Click করুন বা JSON file drag করুন</div>
      <div class="hint">WingsFly_Full_Backup_*.json</div>
      <input type="file" id="backupFile" accept=".json" onchange="loadFile(this.files[0])">
    </div>
    <div id="fileInfo">
      <div>📄 <span class="name" id="fileName"></span></div>
      <div style="margin-top:8px" id="statsDiv">
        <div class="stats-grid" id="statsGrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- Tables to Migrate -->
<div class="card" id="tableCard" style="display:none">
  <b style="color:#e6edf3">📋 Migration Plan</b>
  <div class="table-list" id="tableList"></div>
</div>

<!-- Controls -->
<div class="card">
  <div class="btns">
    <button id="btnStart" onclick="startMigration()" disabled>▶ Migration শুরু করুন</button>
    <button id="btnClear" onclick="document.getElementById('log').innerHTML='';document.getElementById('summary').style.display='none'">🗑 Log Clear</button>
  </div>
  <div style="margin-top:14px">
    <div style="display:flex;justify-content:space-between;font-size:13px;color:#8b949e;margin-bottom:4px">
      <span id="progressLabel">প্রস্তুত</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  </div>
</div>

<!-- Log -->
<div class="card">
  <b style="color:#e6edf3">📜 Log</b>
  <div id="log" style="margin-top:10px"></div>
</div>

<!-- Summary -->
<div id="summary">
  <h3>✅ Migration সম্পন্ন!</h3>
  <div id="summaryContent"></div>
  <p style="margin-top:10px;color:#8b949e;font-size:13px">এখন আপনার WingsFly app refresh করুন।</p>
</div>

<script>
const SUPABASE_URL = 'https://fznhiqzrslldybhmgopk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6bmhpcXpyc2xsZHliaG1nb3BrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NjYzNjcsImV4cCI6MjA5MTE0MjM2N30.p0UJzwfE3XxcUmGUOhIxebXASGL1KTJuKYdfdtYtSBw';

// Backup JSON-এ যে tables আছে এবং Supabase-এ কোন নামে যাবে
const TABLE_MAP = [
  { key: 'students',       table: 'students',       label: 'Students' },
  { key: 'finance_ledger', table: 'finance_ledger', label: 'Finance Ledger' },
  { key: 'accounts',       table: 'accounts',       label: 'Accounts' },
  { key: 'loans',          table: 'loans',          label: 'Loans' },
  { key: 'staff',          table: 'staff',          label: 'Staff' },
  { key: 'salary',         table: 'salary',         label: 'Salary' },
  { key: 'visitors',       table: 'visitors',       label: 'Visitors' },
  { key: 'notices',        table: 'notices',        label: 'Notices' },
  { key: 'exams',          table: 'exams',          label: 'Exams' },
  { key: 'attendance',     table: 'attendance',     label: 'Attendance' },
  { key: 'settings',       table: 'settings',       label: 'Settings' },
];

// Supabase-এ যেসব extra column থাকতে পারে backup-এ নেই — strip করতে হবে
const ALLOWED_KEYS = {
  students: ['id','student_id','name','phone','father_name','mother_name','course','batch','enrollment_date','blood_group','total_fee','paid','due','payment_method','reminder_date','remarks','photo_url','address','email','session','admission_date','status','note','created_at','updated_at'],
  finance_ledger: ['id','date','type','method','category','description','amount','person_name','account_id','note','created_at','updated_at'],
  accounts: ['id','type','name','account_number','branch','balance','created_at','updated_at'],
  loans: ['id','person_name','type','amount','interest_rate','date','due_date','paid','status','note','method','created_at','updated_at'],
  staff: ['id','name','role','phone','email','base_salary','joining_date','resign_date','status','created_at','updated_at'],
  salary: ['id','staff_id','staff_name','month','year','basic','bonus','deduction','total','paid','method','date','status','note','created_at','updated_at'],
  visitors: ['id','name','phone','purpose','host','visit_date','visit_time','out_time','status','note','created_at','updated_at'],
  notices: ['id','title','body','date','created_at','updated_at'],
  exams: ['id','title','batch','course','date','created_at','updated_at'],
  attendance: ['id','student_id','date','status','note','created_at'],
  settings: ['id','academy_name','academy_address','academy_phone','academy_email','admin_password','currency','timezone','logo_url','primary_color','theme','monthly_target','running_batch','expense_start_date','expense_end_date','created_at','updated_at'],
};

let backup = null;
let isRunning = false;
const results = {};

// Drag & Drop
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('active'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('active'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('active'); const f = e.dataTransfer.files[0]; if(f) loadFile(f); });

function loadFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      backup = JSON.parse(e.target.result);
      document.getElementById('fileName').textContent = file.name;
      document.getElementById('fileInfo').style.display = 'block';
      renderStats();
      renderTableList();
      document.getElementById('btnStart').disabled = false;
      log(`✅ File loaded: ${file.name}`, 'ok');
    } catch {
      log('❌ Invalid JSON file!', 'err');
    }
  };
  reader.readAsText(file);
}

function renderStats() {
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = TABLE_MAP.map(t => {
    const count = backup[t.key]?.length || 0;
    return `<div class="stat-box"><div class="num">${count}</div><div class="lbl">${t.label}</div></div>`;
  }).join('');
}

function renderTableList() {
  const list = document.getElementById('tableList');
  list.innerHTML = TABLE_MAP.map(t => {
    const count = backup[t.key]?.length || 0;
    const skip = count === 0;
    return `<div class="table-row" id="trow-${t.table}">
      <div class="tname">${t.label}</div>
      <div class="tcount">${count} rows</div>
      <div class="tstatus ${skip ? 'status-skip' : 'status-pending'}" id="tstatus-${t.table}">${skip ? 'SKIP' : 'PENDING'}</div>
    </div>`;
  }).join('');
  document.getElementById('tableCard').style.display = 'block';
}

function setStatus(table, cls, text) {
  const el = document.getElementById(`tstatus-${table}`);
  if (el) { el.className = `tstatus ${cls}`; el.textContent = text; }
}

function log(msg, type = 'ok') {
  const div = document.getElementById('log');
  div.innerHTML += `<div class="log-${type}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  div.scrollTop = div.scrollHeight;
}

function setProgress(label, pct) {
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
}

function cleanRow(row, table) {
  const allowed = ALLOWED_KEYS[table];
  if (!allowed) return row;
  const clean = {};
  for (const k of allowed) {
    if (row[k] !== undefined) clean[k] = row[k];
  }
  return clean;
}

async function upsert(table, rows) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?on_conflict=id`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify(rows)
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  return true;
}

async function migrateTable(key, table, label) {
  const rows = backup[key];
  if (!rows || rows.length === 0) {
    log(`⏭ ${label}: data নেই, skip`, 'warn');
    setStatus(table, 'status-skip', 'SKIP');
    results[label] = { ok: 0, fail: 0 };
    return;
  }

  setStatus(table, 'status-running', '...');
  log(`\n📦 ${label} (${rows.length} rows) migrate শুরু...`, 'info');
  let ok = 0, fail = 0;
  const BATCH = 20;

  for (let i = 0; i < rows.length; i += BATCH) {
    const batch = rows.slice(i, i + BATCH).map(r => cleanRow(r, table));
    try {
      await upsert(table, batch);
      ok += batch.length;
      log(`  ✅ ${label} batch ${i+1}–${Math.min(i+BATCH, rows.length)}/${rows.length}`, 'ok');
    } catch (e) {
      // Retry one-by-one
      for (const row of batch) {
        try {
          await upsert(table, [row]);
          ok++;
        } catch (e2) {
          log(`  ❌ ${label} row failed [${row.id}]: ${e2.message}`, 'err');
          fail++;
        }
      }
    }
  }

  setStatus(table, fail > 0 ? 'status-err' : 'status-ok', fail > 0 ? `${fail} ERR` : 'DONE');
  log(`📊 ${label}: ${ok} সফল, ${fail} ব্যর্থ`, fail > 0 ? 'warn' : 'ok');
  results[label] = { ok, fail };
}

async function startMigration() {
  if (isRunning || !backup) return;
  isRunning = true;
  document.getElementById('btnStart').disabled = true;
  document.getElementById('summary').style.display = 'none';
  document.getElementById('log').innerHTML = '';

  log('🚀 Migration শুরু হচ্ছে...', 'info');
  const total = TABLE_MAP.length;

  for (let i = 0; i < TABLE_MAP.length; i++) {
    const { key, table, label } = TABLE_MAP[i];
    setProgress(`${label} migrate হচ্ছে...`, Math.round((i / total) * 100));
    await migrateTable(key, table, label);
  }

  setProgress('✅ সম্পন্ন!', 100);
  renderSummary();
  isRunning = false;
  document.getElementById('btnStart').disabled = false;
}

function renderSummary() {
  const el = document.getElementById('summaryContent');
  let totalOk = 0, totalFail = 0;
  el.innerHTML = Object.entries(results).map(([label, r]) => {
    totalOk += r.ok; totalFail += r.fail;
    return `<div class="sum-line">
      <span>${label}</span>
      <span>
        <span class="sum-ok">✓ ${r.ok}</span>
        ${r.fail > 0 ? `<span class="sum-err"> ✗ ${r.fail}</span>` : ''}
      </span>
    </div>`;
  }).join('') + `<div class="sum-line" style="margin-top:6px;font-weight:bold">
    <span>মোট</span>
    <span><span class="sum-ok">✓ ${totalOk}</span>${totalFail>0?`<span class="sum-err"> ✗ ${totalFail}</span>`:''}</span>
  </div>`;
  document.getElementById('summary').style.display = 'block';
  log(`\n🎉 সব শেষ! মোট ${totalOk} rows সফল, ${totalFail} ব্যর্থ।`, totalFail > 0 ? 'warn' : 'ok');
}
</script>
</body>
</html>
