<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WFA Test Suite</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;padding:24px}
h1{color:#00d4ff;margin-bottom:20px;font-size:1.5rem}
#run-btn{margin-bottom:20px;padding:10px 24px;background:linear-gradient(135deg,#00d4ff,#a855f7);border:none;border-radius:8px;color:#fff;font-weight:700;font-size:.9rem;cursor:pointer}
.suite{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px;margin-bottom:16px}
.suite h2{color:#58a6ff;margin-bottom:10px;font-size:1rem}
.test{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #21262d;font-size:.85rem}
.test:last-child{border-bottom:none}
.badge{padding:2px 8px;border-radius:4px;font-weight:700;font-size:.75rem;flex-shrink:0}
.pass{background:rgba(0,255,136,.15);color:#00ff88}
.fail{background:rgba(255,71,87,.15);color:#ff4757}
.skip{background:rgba(255,200,0,.15);color:#ffd700}
.msg{color:#8b949e;font-size:.78rem;margin-left:auto}
#summary{margin-top:24px;padding:16px;background:#161b22;border-radius:10px;border:1px solid #30363d;display:none}
.sum-row{display:flex;gap:24px;flex-wrap:wrap;margin-top:10px}
.sum-stat{text-align:center}
.sum-num{font-size:2rem;font-weight:800}
.sum-lbl{font-size:.75rem;color:#8b949e}
</style>
</head>
<body>
<h1>&#129514; Wings Fly Academy &#8212; Test Suite</h1>
<button id="run-btn" onclick="runAllTests()">&#9654; Run All Tests</button>
<div id="test-output"></div>
<div id="summary"></div>
<script>
/* ==========================================================
   WFA TEST SUITE — Fully self-contained, no external deps
   All HTML built with DOM API (no innerHTML template literals
   that could confuse the HTML parser).
   ========================================================== */

// ── Utility functions under test (inlined) ───────────────────
function _esc(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
function _safeNum(val) { const n = parseFloat(val); return isNaN(n) ? 0 : n; }
function _truncate(str, max) {
  if (!str) return '';
  const s = String(str);
  return s.length > max ? s.slice(0, max) + '\u2026' : s;
}
function _takaEn(n) { return '\u09f3' + Number(n).toLocaleString('en-US'); }
function _generateId() {
  const buf = new Uint32Array(2);
  crypto.getRandomValues(buf);
  return Date.now().toString(36) + buf[0].toString(36) + buf[1].toString(36);
}
function _sortBy(arr, key) {
  return [...arr].sort((a,b) => a[key] > b[key] ? 1 : -1);
}
function _searchFilter(arr, q, fields) {
  const ql = String(q).toLowerCase();
  return arr.filter(r => fields.some(f => String(r[f]||'').toLowerCase().includes(ql)));
}
function _parseAnyDate(d) {
  if (!d) return '';
  const s = String(d).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const p = s.split('/');
  if (p.length === 3 && p[2].length === 4)
    return p[2] + '-' + p[1].padStart(2,'0') + '-' + p[0].padStart(2,'0');
  const dt = new Date(s);
  return isNaN(dt) ? '' : dt.toISOString().split('T')[0];
}
function _formatDateDMY(d) {
  if (!d) return '';
  const iso = _parseAnyDate(d);
  if (!iso) return d;
  const parts = iso.split('-');
  return parts[2] + '/' + parts[1] + '/' + parts[0];
}
function _isValidDate(d) {
  if (!d || typeof d !== 'string') return false;
  const iso = /^\d{4}-\d{2}-\d{2}$/.test(d) ? d : _parseAnyDate(d);
  if (!iso) return false;
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return false;
  const y = dt.getFullYear();
  return y >= 1900 && y <= 2100;
}
function _isValidDateRange(s, e) {
  if (!_isValidDate(s) || !_isValidDate(e)) return false;
  return new Date(_parseAnyDate(s)||s) <= new Date(_parseAnyDate(e)||e);
}
function _sanitizeDate(d, fb) {
  if (_isValidDate(d)) return _parseAnyDate(d) || d;
  const f = fb !== undefined ? fb : new Date().toISOString().split('T')[0];
  return _isValidDate(f) ? f : new Date().toISOString().split('T')[0];
}

// ── SecureStorage functions (inlined) ────────────────────────
const ENC_PREFIX = 'wfa_enc::';
async function _getKey() {
  const raw = 'WFA|SECURE|SALT';
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(raw), {name:'PBKDF2'}, false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:enc.encode('WFA_SALT'), iterations:1000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']
  );
}
async function _encrypt(pt) {
  const key = await _getKey();
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const buf = await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, new TextEncoder().encode(pt));
  const combined = new Uint8Array(iv.byteLength + buf.byteLength);
  combined.set(iv, 0); combined.set(new Uint8Array(buf), iv.byteLength);
  return ENC_PREFIX + btoa(String.fromCharCode(...combined));
}
async function _decrypt(ct) {
  if (!ct || !ct.startsWith(ENC_PREFIX)) return ct;
  const key = await _getKey();
  const raw = atob(ct.slice(ENC_PREFIX.length));
  const bytes = new Uint8Array([...raw].map(c => c.charCodeAt(0)));
  const buf = await crypto.subtle.decrypt({name:'AES-GCM',iv:bytes.slice(0,12)}, key, bytes.slice(12));
  return new TextDecoder().decode(buf);
}
const _mem = new Map();
function _safeGet(k) { try { return localStorage.getItem(k); } catch { return _mem.get(k) ?? null; } }
function _safeSet(k,v) { try { localStorage.setItem(k,v); } catch { _mem.set(k,v); } }
function _safeRemove(k) { try { localStorage.removeItem(k); } catch { _mem.delete(k); } }

// ── i18n (inlined) ───────────────────────────────────────────
const _msgs = {
  'ui.noData':    { en: 'No data available.', bn: '\u0995\u09cb\u09a8\u09cb \u09a4\u09a5\u09cd\u09af \u09a8\u09c7\u0987\u0964' },
  'ui.loading':   { en: 'Loading...',         bn: '\u09b2\u09cb\u09a1 \u09b9\u099a\u09cd\u099b\u09c7...' },
};
function _t(key, lang) {
  const e = _msgs[key];
  if (!e) return key;
  return e[lang] || e['en'] || key;
}
function _addMsg(key, en, bn) { _msgs[key] = {en, bn}; }

// ── Test Framework ───────────────────────────────────────────
const results = [];
function assert(desc, condition, errMsg) {
  results.push({ desc, pass: !!condition, msg: errMsg || '' });
}
async function assertAsync(desc, fn) {
  try { await fn(); results.push({ desc, pass: true, msg: '' }); }
  catch(e) { results.push({ desc, pass: false, msg: String(e.message).slice(0,80) }); }
}

function renderResults() {
  const out = document.getElementById('test-output');
  while (out.firstChild) out.removeChild(out.firstChild);

  const suiteMap = {};
  results.forEach(r => {
    const [suite, ...rest] = r.desc.split(' > ');
    const name = rest.join(' > ') || suite;
    if (!suiteMap[suite]) suiteMap[suite] = [];
    suiteMap[suite].push({ ...r, name });
  });

  let total=0, passed=0, failed=0, skipped=0;

  for (const [suite, tests] of Object.entries(suiteMap)) {
    const div = document.createElement('div');
    div.className = 'suite';
    const h2 = document.createElement('h2');
    h2.textContent = suite;
    div.appendChild(h2);

    tests.forEach(t => {
      total++;
      const row = document.createElement('div');
      row.className = 'test';
      const badge = document.createElement('span');
      badge.className = 'badge ' + (t.pass===null?'skip':t.pass?'pass':'fail');
      badge.textContent = (t.pass===null?'SKIP':t.pass?'PASS':'FAIL');
      if (t.pass===null) skipped++; else if(t.pass) passed++; else failed++;
      const label = document.createElement('span');
      label.textContent = (t.pass===null?'\u23ed':t.pass?'\u2705':'\u274c') + ' ' + t.name;
      row.appendChild(badge);
      row.appendChild(label);
      if (t.msg) {
        const msg = document.createElement('span');
        msg.className = 'msg';
        msg.textContent = t.msg;
        row.appendChild(msg);
      }
      div.appendChild(row);
    });
    out.appendChild(div);
  }

  const sumEl = document.getElementById('summary');
  sumEl.style.display = 'block';
  while (sumEl.firstChild) sumEl.removeChild(sumEl.firstChild);

  const h2 = document.createElement('h2');
  h2.textContent = '\ud83d\udcca Test Summary';
  sumEl.appendChild(h2);

  const row = document.createElement('div');
  row.className = 'sum-row';
  const pct = total ? Math.round(passed/total*100) : 0;
  const stats = [
    {n:passed, l:'Passed', c:'#00ff88'},
    {n:failed, l:'Failed', c:'#ff4757'},
    {n:skipped,l:'Skipped',c:'#ffd700'},
    {n:total,  l:'Total',  c:'#c9d1d9'},
    {n:pct+'%',l:'Pass Rate', c: failed>0?'#ff4757':'#00ff88'},
  ];
  stats.forEach(s => {
    const cell = document.createElement('div');
    cell.className = 'sum-stat';
    const num = document.createElement('div');
    num.className = 'sum-num';
    num.style.color = s.c;
    num.textContent = String(s.n);
    const lbl = document.createElement('div');
    lbl.className = 'sum-lbl';
    lbl.textContent = s.l;
    cell.appendChild(num);
    cell.appendChild(lbl);
    row.appendChild(cell);
  });
  sumEl.appendChild(row);
}

// ── Run All Tests ────────────────────────────────────────────
async function runAllTests() {
  results.length = 0;
  const out = document.getElementById('test-output');
  out.textContent = 'Running tests...';

  // ── Suite: Utils ──
  assert('Utils > esc() encodes angle brackets', _esc('\u003cb\u003e') === '&lt;b&gt;');
  assert('Utils > esc() null returns empty', _esc(null) === '');
  assert('Utils > esc() undefined returns empty', _esc(undefined) === '');
  assert('Utils > esc() strips quotes', _esc('"test"').includes('&quot;'));
  assert('Utils > safeNum() NaN returns 0', _safeNum('abc') === 0);
  assert('Utils > safeNum() parses float', _safeNum('123.45') === 123.45);
  assert('Utils > safeNum() negative number', _safeNum('-99') === -99);
  assert('Utils > safeNum() zero', _safeNum(0) === 0);
  assert('Utils > truncate() cuts long string', _truncate('Hello World', 5) === 'Hello\u2026');
  assert('Utils > truncate() keeps short string', _truncate('Hi', 10) === 'Hi');
  assert('Utils > takaEn() has currency symbol', _takaEn(1234).includes('1,234'));
  assert('Utils > generateId() is non-empty string', typeof _generateId() === 'string' && _generateId().length > 4);
  assert('Utils > generateId() unique values', _generateId() !== _generateId());
  assert('Utils > sortBy() ascending order', JSON.stringify(_sortBy([{n:3},{n:1},{n:2}],'n').map(x=>x.n)) === '[1,2,3]');
  assert('Utils > searchFilter() finds match', _searchFilter([{name:'Rahim'},{name:'Karim'}],'rah',['name']).length === 1);
  assert('Utils > searchFilter() no match returns empty', _searchFilter([{name:'Rahim'}],'xyz',['name']).length === 0);
  assert('Utils > parseAnyDate() ISO passthrough', _parseAnyDate('2026-01-15') === '2026-01-15');
  assert('Utils > parseAnyDate() DD/MM/YYYY converts', _parseAnyDate('15/04/2026') === '2026-04-15');
  assert('Utils > parseAnyDate() null returns empty', _parseAnyDate(null) === '');
  assert('Utils > formatDateDMY() formats correctly', _formatDateDMY('2026-04-15') === '15/04/2026');

  // ── Suite: Date Validation (Bug 29) ──
  assert('Date > isValidDate() valid ISO', _isValidDate('2026-04-15') === true);
  assert('Date > isValidDate() rejects null', _isValidDate(null) === false);
  assert('Date > isValidDate() rejects empty', _isValidDate('') === false);
  assert('Date > isValidDate() rejects year 9999', _isValidDate('9999-01-01') === false);
  assert('Date > isValidDate() rejects garbage', _isValidDate('not-a-date') === false);
  assert('Date > isValidDateRange() valid range ok', _isValidDateRange('2026-01-01','2026-12-31') === true);
  assert('Date > isValidDateRange() start after end fails', _isValidDateRange('2026-12-31','2026-01-01') === false);
  assert('Date > sanitizeDate() passes valid date', _sanitizeDate('2026-05-01') === '2026-05-01');
  assert('Date > sanitizeDate() uses fallback on bad input', _sanitizeDate('bad','2026-01-01') === '2026-01-01');

  // ── Suite: i18n (Bug 25) ──
  assert('i18n > Bengali translation works', _t('ui.noData','bn') === '\u0995\u09cb\u09a8\u09cb \u09a4\u09a5\u09cd\u09af \u09a8\u09c7\u0987\u0964');
  assert('i18n > English translation works', _t('ui.noData','en') === 'No data available.');
  assert('i18n > unknown key returns key itself', _t('no.such.key','bn') === 'no.such.key');
  assert('i18n > addMessage() works', (() => { _addMsg('t.x','EN','BN'); return _t('t.x','bn') === 'BN'; })());

  // ── Suite: SecureStorage (Bug 6, 21, 22) ──
  assert('SecureStorage > IndexedDB available check is boolean', typeof (typeof indexedDB !== 'undefined') === 'boolean');
  assert('SecureStorage > safeGet/safeSet round-trip', (() => { _safeSet('__t__','hello'); return _safeGet('__t__') === 'hello'; })());
  assert('SecureStorage > safeRemove deletes key', (() => { _safeSet('__d__','x'); _safeRemove('__d__'); return _safeGet('__d__') === null; })());
  assert('SecureStorage > memory Map get/set', (() => { _mem.set('mk','mv'); return _mem.get('mk') === 'mv'; })());

  await assertAsync('SecureStorage > encrypt returns ENC_PREFIX', async () => {
    const enc = await _encrypt('secret-key-123');
    if (!enc.startsWith(ENC_PREFIX)) throw new Error('No prefix. Got: ' + enc.slice(0,20));
  });
  await assertAsync('SecureStorage > decrypt round-trip', async () => {
    const enc = await _encrypt('roundtrip-value');
    const dec = await _decrypt(enc);
    if (dec !== 'roundtrip-value') throw new Error('Got: ' + dec);
  });
  await assertAsync('SecureStorage > different plaintexts give different ciphertexts', async () => {
    const a = await _encrypt('valueA');
    const b = await _encrypt('valueB');
    if (a === b) throw new Error('Same ciphertext for different plaintexts');
  });

  // ── Suite: Security ──
  assert('Security > esc() prevents img injection', !_esc('\u003cimg src=x onerror=alert(1)\u003e').includes('\u003cimg'));
  assert('Security > esc() output has no raw angle brackets', !_esc('\u003cany-tag\u003e').match(/[<>]/));
  assert('Security > safeNum() string injection returns 0', _safeNum('DROP TABLE') === 0);

  // ── Suite: Finance (Bug 28 regression) ──
  assert('Finance > safeNum(0) is 0', _safeNum(0) === 0);
  assert('Finance > negative amount preserved', _safeNum('-500') === -500);
  assert('Finance > empty string is 0', _safeNum('') === 0);

  renderResults();
}
</script>
</body>
</html>
