name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Install dependencies
      run: npm ci

    - name: Patch speech-recognition Gradle compatibility
      run: |
        FILE="node_modules/@capacitor-community/speech-recognition/android/build.gradle"
        if [ -f "$FILE" ]; then
          sed -i "s/proguard-android.txt/proguard-android-optimize.txt/g" "$FILE"
          echo "Patched deprecated proguard file reference in $FILE"
        else
          echo "Plugin build.gradle not found, skipping patch"
        fi
    
    - name: Prepare Android gradlew permissions
      run: chmod +x android/gradlew
    
    - name: Build web assets
      run: node build-www.js
    
    - name: Sync Capacitor Plugins
      run: npx --yes cap sync
    
    - name: Build Android Debug APK
      working-directory: ./android
      run: |
        export GRADLE_USER_HOME=$(pwd)/../.gradle
        ./gradlew clean assembleDebug
    
    - name: Upload APK to Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: android/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
