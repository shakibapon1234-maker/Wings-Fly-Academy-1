<!-- ============================================================
     certificates.html — Aviation Certificate Generator Section
     Wings Fly Aviation Academy
     ============================================================ -->

<div class="section-header">
  <div>
    <h2 class="section-title">🎓 সার্টিফিকেট জেনারেটর</h2>
    <p class="section-subtitle">Aviation Certificate Generator — Print-Ready</p>
  </div>
</div>

<div class="cert-layout">
  <!-- Left Panel: Form -->
  <div class="card cert-form-panel">
    <h4 class="panel-title">📝 তথ্য পূরণ করুন</h4>

    <!-- Auto-fill from Student -->
    <div class="form-group">
      <label class="form-label">ছাত্র থেকে Auto-fill করুন</label>
      <div class="autofill-row">
        <input type="text" id="cert-student-search" class="form-input" placeholder="নাম বা Student ID..." oninput="CertUI.searchStudent()">
        <button class="btn btn-outline" onclick="CertUI.clearForm()">🔄 ক্লিয়ার</button>
      </div>
      <div id="cert-student-results" class="id-search-results"></div>
    </div>

    <div class="form-divider">সার্টিফিকেটের তথ্য</div>

    <div class="form-grid-2">
      <div class="form-group">
        <label class="form-label">ছাত্রের নাম *</label>
        <input type="text" id="cert-student-name" class="form-input" placeholder="পূর্ণ নাম" oninput="CertUI.updatePreview()">
      </div>
      <div class="form-group">
        <label class="form-label">পিতার নাম</label>
        <input type="text" id="cert-father-name" class="form-input" placeholder="পিতার নাম" oninput="CertUI.updatePreview()">
      </div>
      <div class="form-group">
        <label class="form-label">Student ID</label>
        <input type="text" id="cert-student-id" class="form-input" placeholder="STU-001" oninput="CertUI.updatePreview()">
      </div>
      <div class="form-group">
        <label class="form-label">সার্টিফিকেট নম্বর</label>
        <input type="text" id="cert-number" class="form-input" placeholder="WFA-2026-0001" oninput="CertUI.updatePreview()">
      </div>
      <div class="form-group">
        <label class="form-label">কোর্সের নাম *</label>
        <input type="text" id="cert-course" class="form-input" placeholder="Aviation Ground Handling" oninput="CertUI.updatePreview()">
      </div>
      <div class="form-group">
        <label class="form-label">কোর্সের মেয়াদ</label>
        <input type="text" id="cert-duration" class="form-input" placeholder="৩ মাস / 90 Days" oninput="CertUI.updatePreview()">
      </div>
      <div class="form-group">
        <label class="form-label">ব্যাচ</label>
        <input type="text" id="cert-batch" class="form-input" placeholder="Batch-01" oninput="CertUI.updatePreview()">
      </div>
      <div class="form-group">
        <label class="form-label">সেশন</label>
        <input type="text" id="cert-session" class="form-input" placeholder="Jan-Jun 2026" oninput="CertUI.updatePreview()">
      </div>
      <div class="form-group">
        <label class="form-label">গ্রেড</label>
        <select id="cert-grade" class="form-select" onchange="CertUI.updatePreview()">
          <option value="">গ্রেড সিলেক্ট করুন</option>
          <option value="A+">A+ (Outstanding)</option>
          <option value="A">A (Excellent)</option>
          <option value="A-">A- (Very Good)</option>
          <option value="B+">B+ (Good)</option>
          <option value="B">B (Above Average)</option>
          <option value="C">C (Average)</option>
          <option value="F">F (Failed)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">প্রাপ্ত নম্বর</label>
        <div class="input-row">
          <input type="number" id="cert-marks" class="form-input" placeholder="৮৫" oninput="CertUI.updatePreview()">
          <span class="input-sep">/</span>
          <input type="number" id="cert-total-marks" class="form-input" placeholder="১০০" oninput="CertUI.updatePreview()">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">ইস্যু তারিখ *</label>
        <input type="date" id="cert-issue-date" class="form-input" oninput="CertUI.updatePreview()">
      </div>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary btn-block" onclick="CertUI.printCurrent()">🖨️ সার্টিফিকেট প্রিন্ট করুন</button>
    </div>
  </div>

  <!-- Right Panel: Preview -->
  <div class="card cert-preview-panel">
    <h4 class="panel-title">🔍 প্রিভিউ (A4 Landscape)</h4>
    <div id="cert-preview-container" class="cert-preview-scroll">
      <div class="cert-preview-placeholder">
        বাম দিকে তথ্য পূরণ করলে এখানে সার্টিফিকেট দেখাবে
      </div>
    </div>
  </div>
</div>

<!-- Certificate CSS (injected for preview) -->
<style>
.cert-layout { display: grid; grid-template-columns: 380px 1fr; gap: 16px; }
.cert-form-panel { height: fit-content; }
.cert-preview-panel { overflow: hidden; }
.cert-preview-scroll { overflow: auto; max-height: 700px; padding: 8px; background: #d0c8b0; border-radius: 8px; }
.cert-preview-placeholder { color: #888; text-align: center; padding: 60px 20px; }

.certificate-wrapper { padding: 10px; }
.certificate-page { background: #fff; padding: 0; font-family: 'Times New Roman', Georgia, serif; min-width: 700px; }
.cert-border-outer { border: 8px solid #8b6914; padding: 6px; }
.cert-border-inner { border: 3px double #8b6914; padding: 24px 32px; background: #fffef8; }
.cert-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.cert-logo-left, .cert-logo-right { width: 60px; height: 60px; object-fit: contain; }
.cert-title-block { flex: 1; text-align: center; }
.cert-govt-text { font-size: 10px; color: #666; letter-spacing: 2px; text-transform: uppercase; }
.cert-academy-name { font-size: 18px; font-weight: 700; color: #1a3a6b; }
.cert-academy-address { font-size: 10px; color: #555; }
.cert-divider { border: none; border-top: 2px solid #8b6914; margin: 10px 0; }
.cert-certificate-of { text-align: center; font-size: 20px; font-weight: 700; color: #1a3a6b; letter-spacing: 3px; text-transform: uppercase; margin: 10px 0 4px; }
.cert-presented-to { text-align: center; font-size: 12px; color: #555; font-style: italic; margin-bottom: 6px; }
.cert-student-name { text-align: center; font-size: 26px; font-weight: 700; color: #8b1a1a; border-bottom: 2px solid #8b6914; display: inline-block; width: 100%; padding-bottom: 2px; margin-bottom: 8px; }
.cert-body-text { text-align: center; font-size: 12px; color: #333; margin-bottom: 6px; line-height: 1.6; }
.cert-course-name { text-align: center; font-size: 16px; font-weight: 700; color: #1a3a6b; margin: 6px 0; }
.cert-grade-block { text-align: center; margin: 8px 0; }
.cert-grade-label { font-size: 12px; color: #555; }
.cert-grade-value { font-size: 20px; font-weight: 700; margin: 0 6px; }
.cert-grade-desc { font-size: 11px; color: #666; font-style: italic; }
.cert-marks { text-align: center; font-size: 12px; color: #444; margin-bottom: 8px; }
.cert-congrats { text-align: center; font-size: 11px; color: #555; font-style: italic; max-width: 500px; margin: 8px auto; line-height: 1.6; }
.cert-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 20px; padding-top: 10px; border-top: 1px solid #ccc; }
.cert-sig-block { text-align: center; }
.cert-sig-img { height: 32px; opacity: 0.8; }
.cert-sig-line { border-top: 1px solid #333; width: 160px; margin: 4px auto 2px; }
.cert-sig-name { font-size: 12px; font-weight: 700; }
.cert-sig-title { font-size: 10px; color: #555; }
.cert-seal { width: 70px; height: 70px; border: 3px solid #8b6914; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #8b6914; text-align: center; line-height: 1.3; }
.cert-meta { display: flex; justify-content: space-between; font-size: 9px; color: #777; margin-top: 10px; padding-top: 6px; border-top: 1px dashed #ccc; }
@media print { .cert-preview-scroll { background: white; } }
</style>

<script>
const CertUI = (() => {
  function init() {
    document.getElementById('cert-issue-date').value = Utils.today();
    updatePreview();
  }

  function searchStudent() {
    const q = document.getElementById('cert-student-search').value.toLowerCase();
    const container = document.getElementById('cert-student-results');
    if (!q || typeof StudentsModule === 'undefined') { container.innerHTML = ''; return; }

    const matches = StudentsModule.getAll().filter(s =>
      s.name.toLowerCase().includes(q) || (s.studentId || '').toLowerCase().includes(q)
    ).slice(0, 8);

    container.innerHTML = matches.map(s => `
<div class="search-result-item" onclick="CertUI.autoFill('${s.id}')">
  <strong>${s.name}</strong> <span class="mono">${s.studentId || s.id}</span>
  <small>${s.course || ''} | ${s.batch || ''}</small>
</div>`).join('') || '<div class="search-result-empty">কোনো ছাত্র পাওয়া যায়নি</div>';
  }

  function autoFill(id) {
    const data = CertificatesModule.fillFromStudent(id);
    if (!data) return;
    document.getElementById('cert-student-name').value = data.studentName || '';
    document.getElementById('cert-father-name').value = data.fatherName || '';
    document.getElementById('cert-student-id').value = data.studentId || '';
    document.getElementById('cert-number').value = data.certNumber || '';
    document.getElementById('cert-course').value = data.courseName || '';
    document.getElementById('cert-batch').value = data.batch || '';
    document.getElementById('cert-session').value = data.session || '';
    document.getElementById('cert-grade').value = data.grade || '';
    document.getElementById('cert-marks').value = data.marks || '';
    document.getElementById('cert-total-marks').value = data.totalMarks || '';
    document.getElementById('cert-issue-date').value = data.issueDate || Utils.today();
    document.getElementById('cert-student-results').innerHTML = '';
    document.getElementById('cert-student-search').value = '';
    updatePreview();
    UI.toast(`${data.studentName} এর তথ্য লোড হয়েছে ✓`);
  }

  function getFormData() {
    return {
      studentName: document.getElementById('cert-student-name').value,
      fatherName: document.getElementById('cert-father-name').value,
      studentId: document.getElementById('cert-student-id').value,
      certNumber: document.getElementById('cert-number').value,
      courseName: document.getElementById('cert-course').value,
      duration: document.getElementById('cert-duration').value,
      batch: document.getElementById('cert-batch').value,
      session: document.getElementById('cert-session').value,
      grade: document.getElementById('cert-grade').value,
      marks: document.getElementById('cert-marks').value,
      totalMarks: document.getElementById('cert-total-marks').value,
      issueDate: document.getElementById('cert-issue-date').value,
    };
  }

  function updatePreview() {
    const data = getFormData();
    if (!data.studentName) {
      document.getElementById('cert-preview-container').innerHTML = '<div class="cert-preview-placeholder">বাম দিকে তথ্য পূরণ করলে এখানে সার্টিফিকেট দেখাবে</div>';
      return;
    }
    CertificatesModule.renderPreview('cert-preview-container', data);
  }

  function printCurrent() {
    const data = getFormData();
    if (!data.studentName) { UI.toast('ছাত্রের নাম প্রয়োজন', 'error'); return; }
    CertificatesModule.print(data);
  }

  function clearForm() {
    ['cert-student-name','cert-father-name','cert-student-id','cert-number',
     'cert-course','cert-duration','cert-batch','cert-session','cert-marks','cert-total-marks']
      .forEach(id => document.getElementById(id).value = '');
    document.getElementById('cert-grade').value = '';
    document.getElementById('cert-issue-date').value = Utils.today();
    updatePreview();
  }

  return { init, searchStudent, autoFill, updatePreview, printCurrent, clearForm };
})();

document.addEventListener('DOMContentLoaded', CertUI.init);
</script>
