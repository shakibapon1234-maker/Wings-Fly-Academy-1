<!-- ============================================================
     id-cards.html — ID Card Generator Section
     Wings Fly Aviation Academy
     ============================================================ -->

<div class="section-header">
  <div>
    <h2 class="section-title">🪪 আইডি কার্ড জেনারেটর</h2>
    <p class="section-subtitle">Student & Staff ID Card Generator</p>
  </div>
</div>

<!-- Type Tabs -->
<div class="tab-pills">
  <button class="tab-pill active" onclick="IDCardUI.switchType('student', this)">🎓 Student ID</button>
  <button class="tab-pill" onclick="IDCardUI.switchType('staff', this)">👤 Staff ID</button>
</div>

<div class="id-card-layout">
  <!-- Left: Search & Select -->
  <div class="card id-search-panel">
    <div class="form-group">
      <label class="form-label" id="id-search-label">ছাত্র খুঁজুন</label>
      <input type="text" id="id-search-input" class="form-input" placeholder="নাম বা ID দিয়ে খুঁজুন..." oninput="IDCardUI.searchPerson()">
    </div>
    <div id="id-search-results" class="id-search-results"></div>

    <div class="form-divider">অথবা ম্যানুয়ালি পূরণ করুন</div>

    <div id="id-manual-form">
      <div class="form-group">
        <label class="form-label">নাম *</label>
        <input type="text" id="id-name" class="form-input" placeholder="পূর্ণ নাম" oninput="IDCardUI.updatePreview()">
      </div>
      <div class="form-group">
        <label class="form-label">ID নম্বর</label>
        <input type="text" id="id-number" class="form-input" placeholder="STU-001" oninput="IDCardUI.updatePreview()">
      </div>
      <div class="form-group">
        <label class="form-label" id="id-role-label">কোর্স</label>
        <input type="text" id="id-role" class="form-input" placeholder="Aviation Ground Handling" oninput="IDCardUI.updatePreview()">
      </div>
      <div class="form-group" id="id-batch-group">
        <label class="form-label">ব্যাচ</label>
        <input type="text" id="id-batch" class="form-input" placeholder="Batch-01" oninput="IDCardUI.updatePreview()">
      </div>
      <div class="form-group" id="id-session-group">
        <label class="form-label">সেশন</label>
        <input type="text" id="id-session" class="form-input" placeholder="Jan-2026" oninput="IDCardUI.updatePreview()">
      </div>
      <div class="form-group">
        <label class="form-label">ফোন</label>
        <input type="text" id="id-phone" class="form-input" placeholder="01XXXXXXXXX" oninput="IDCardUI.updatePreview()">
      </div>
      <div class="form-group" id="id-valid-group">
        <label class="form-label">বৈধতার মেয়াদ</label>
        <input type="date" id="id-valid-until" class="form-input" oninput="IDCardUI.updatePreview()">
      </div>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary btn-block" onclick="IDCardUI.printCurrent()">🖨️ এই কার্ড প্রিন্ট করুন</button>
    </div>
  </div>

  <!-- Right: Preview -->
  <div class="card id-preview-panel">
    <h4 class="panel-title">🔍 প্রিভিউ</h4>
    <div id="id-card-preview-container">
      <div class="id-card-placeholder">
        <span>বাম দিকে তথ্য পূরণ করুন</span>
      </div>
    </div>

    <div class="id-card-css-block">
      <style>
        .id-card { width: 320px; min-height: 190px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.18); overflow: hidden; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a3a6b 0%, #0d2040 100%); color: white; margin: 0 auto; }
        .id-card-header { display: flex; align-items: center; gap: 8px; padding: 10px 12px 6px; background: rgba(255,255,255,0.08); border-bottom: 1px solid rgba(255,255,255,0.12); }
        .id-logo { width: 36px; height: 36px; object-fit: contain; }
        .id-academy-info { flex: 1; }
        .id-academy-name { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; line-height: 1.2; }
        .id-academy-sub { font-size: 8px; opacity: 0.75; }
        .id-type-badge { text-align: center; padding: 4px; font-size: 9px; font-weight: 700; letter-spacing: 2px; }
        .id-type-badge.student { background: #f59e0b; color: #1a1a1a; }
        .id-type-badge.staff { background: #22c55e; color: #1a1a1a; }
        .id-body { display: flex; gap: 10px; padding: 8px 12px; }
        .id-photo-area { flex-shrink: 0; }
        .id-photo-placeholder { width: 56px; height: 70px; background: rgba(255,255,255,0.1); border: 2px dashed rgba(255,255,255,0.3); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .id-photo-initial { font-size: 24px; font-weight: 700; opacity: 0.7; }
        .id-details { flex: 1; }
        .id-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
        .id-row { display: flex; gap: 4px; font-size: 9px; margin-bottom: 2px; }
        .id-label { opacity: 0.65; min-width: 42px; }
        .id-val { font-weight: 600; }
        .id-valid .id-val { color: #fcd34d; }
        .id-footer { display: flex; justify-content: space-between; align-items: flex-end; padding: 6px 12px 8px; border-top: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); }
        .id-sig-area { text-align: center; }
        .id-signature { height: 22px; opacity: 0.85; filter: brightness(10); }
        .id-sig-label { font-size: 7px; opacity: 0.65; margin-top: 2px; }
        .id-contact { font-size: 8px; opacity: 0.6; text-align: right; }
      </style>
    </div>
  </div>
</div>

<!-- Bulk Print Section -->
<div class="card mt-16">
  <div class="card-header">
    <h3>📦 বাল্ক প্রিন্ট</h3>
  </div>
  <div class="card-body">
    <div class="filter-bar">
      <select id="bulk-batch" class="form-select">
        <option value="">ব্যাচ সিলেক্ট করুন</option>
      </select>
      <select id="bulk-type" class="form-select">
        <option value="student">Student IDs</option>
        <option value="staff">Staff IDs</option>
      </select>
      <button class="btn btn-primary" onclick="IDCardUI.printBulk()">🖨️ সব কার্ড প্রিন্ট করুন</button>
    </div>
  </div>
</div>

<script>
const IDCardUI = (() => {
  let currentType = 'student';
  let currentPerson = null;

  function init() {
    updatePreview();
    loadBatchOptions();
  }

  function switchType(type, btn) {
    currentType = type;
    document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const isStudent = type === 'student';
    document.getElementById('id-search-label').textContent = isStudent ? 'ছাত্র খুঁজুন' : 'কর্মী খুঁজুন';
    document.getElementById('id-role-label').textContent = isStudent ? 'কোর্স' : 'পদবি';
    document.getElementById('id-batch-group').style.display = isStudent ? '' : 'none';
    document.getElementById('id-session-group').style.display = isStudent ? '' : 'none';
    document.getElementById('id-valid-group').style.display = isStudent ? '' : 'none';
    document.getElementById('id-search-input').value = '';
    document.getElementById('id-search-results').innerHTML = '';
    clearForm();
    updatePreview();
  }

  function clearForm() {
    ['id-name','id-number','id-role','id-batch','id-session','id-phone','id-valid-until']
      .forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
    currentPerson = null;
  }

  function searchPerson() {
    const q = document.getElementById('id-search-input').value.toLowerCase();
    const container = document.getElementById('id-search-results');
    if (!q) { container.innerHTML = ''; return; }

    const list = currentType === 'student'
      ? (typeof StudentsModule !== 'undefined' ? StudentsModule.getAll() : [])
      : (typeof HRStaffModule !== 'undefined' ? HRStaffModule.getAll() : []);

    const matches = list.filter(p =>
      p.name.toLowerCase().includes(q) ||
      (p.studentId || p.employeeId || p.id || '').toLowerCase().includes(q)
    ).slice(0, 8);

    container.innerHTML = matches.map(p => `
<div class="search-result-item" onclick="IDCardUI.selectPerson('${p.id}')">
  <strong>${p.name}</strong>
  <span class="mono">${p.studentId || p.employeeId || p.id}</span>
</div>`).join('') || '<div class="search-result-empty">কোনো ফলাফল নেই</div>';
  }

  function selectPerson(id) {
    const list = currentType === 'student'
      ? (typeof StudentsModule !== 'undefined' ? StudentsModule.getAll() : [])
      : (typeof HRStaffModule !== 'undefined' ? HRStaffModule.getAll() : []);
    const p = list.find(x => x.id === id);
    if (!p) return;
    currentPerson = p;
    document.getElementById('id-name').value = p.name || '';
    document.getElementById('id-number').value = p.studentId || p.employeeId || p.id || '';
    document.getElementById('id-role').value = currentType === 'student' ? (p.course || '') : (p.role || '');
    document.getElementById('id-batch').value = p.batch || '';
    document.getElementById('id-session').value = p.session || '';
    document.getElementById('id-phone').value = p.phone || '';
    document.getElementById('id-search-results').innerHTML = '';
    document.getElementById('id-search-input').value = '';
    updatePreview();
    UI.toast(`${p.name} সিলেক্ট হয়েছে`);
  }

  function getFormData() {
    const isStudent = currentType === 'student';
    return {
      id: document.getElementById('id-number').value || Utils.uid('ID'),
      name: document.getElementById('id-name').value,
      phone: document.getElementById('id-phone').value,
      studentId: isStudent ? document.getElementById('id-number').value : undefined,
      employeeId: !isStudent ? document.getElementById('id-number').value : undefined,
      course: isStudent ? document.getElementById('id-role').value : undefined,
      role: !isStudent ? document.getElementById('id-role').value : undefined,
      batch: document.getElementById('id-batch')?.value,
      session: document.getElementById('id-session')?.value,
      validUntil: document.getElementById('id-valid-until')?.value,
      department: !isStudent ? document.getElementById('id-role').value : undefined,
    };
  }

  function updatePreview() {
    const data = getFormData();
    if (!data.name) {
      document.getElementById('id-card-preview-container').innerHTML = `<div class="id-card-placeholder"><span>বাম দিকে তথ্য পূরণ করুন</span></div>`;
      return;
    }
    IDCardsModule.renderPreview('id-card-preview-container', data, currentType);
  }

  function printCurrent() {
    const data = getFormData();
    if (!data.name) { UI.toast('নাম প্রয়োজন', 'error'); return; }
    IDCardsModule.printCard(data, currentType);
  }

  function loadBatchOptions() {
    const sel = document.getElementById('bulk-batch');
    if (typeof StudentsModule === 'undefined') return;
    const batches = [...new Set(StudentsModule.getAll().map(s => s.batch).filter(Boolean))];
    sel.innerHTML = '<option value="">ব্যাচ সিলেক্ট করুন</option>' +
      batches.map(b => `<option value="${b}">${b}</option>`).join('');
  }

  function printBulk() {
    const batch = document.getElementById('bulk-batch').value;
    const type = document.getElementById('bulk-type').value;
    let persons = type === 'student'
      ? (typeof StudentsModule !== 'undefined' ? StudentsModule.getAll() : [])
      : (typeof HRStaffModule !== 'undefined' ? HRStaffModule.getAll() : []);
    if (batch) persons = persons.filter(p => p.batch === batch);
    if (!persons.length) { UI.toast('কোনো রেকর্ড পাওয়া যায়নি', 'error'); return; }
    IDCardsModule.printBulk(persons, type);
  }

  return { init, switchType, searchPerson, selectPerson, updatePreview, printCurrent, printBulk };
})();

document.addEventListener('DOMContentLoaded', IDCardUI.init);
</script>
